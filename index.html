<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mind Map Infinite Canvas</title>
    <script id="app-snapshot" type="application/json"></script>
  </head>
  <body>
    <div class="app-shell">
<main class="workspace" data-testid="workspace">
        <div
          id="presentation-toolbar-hover-zone"
          class="presentation-toolbar-hover-zone"
          aria-hidden="true"
          data-testid="presentation-toolbar-hover-zone"
        ></div>
        <header class="toolbar" data-testid="toolbar">
          <!-- Left: project title -->
          <div class="toolbar__title-area">
            <span class="toolbar__project-title" id="project-title">Untitled</span>
          </div>

          <!-- Center: Edit / Present capsule -->
          <div class="toolbar__center">
            <button
              id="drawing-visibility-toggle"
              class="toolbar__icon-button toolbar__present-tool"
              type="button"
              aria-label="Hide drawings"
              title="Hide drawings"
              aria-pressed="true"
              data-testid="drawing-visibility-toggle"
              hidden
            >
              <i data-lucide="eye" aria-hidden="true"></i>
            </button>
            <div class="mode-capsule" id="mode-capsule" role="group" aria-label="Editing mode" data-testid="mode-capsule">
              <button type="button" class="mode-capsule__btn" data-mode="edit" id="mode-capsule-edit" data-testid="mode-capsule-edit" aria-pressed="true">Edit</button>
              <button type="button" class="mode-capsule__btn" data-mode="present" id="mode-capsule-present" data-testid="mode-capsule-present" aria-pressed="false">Present</button>
            </div>
          </div>

          <!-- Right: share / exit -->
          <div class="toolbar__actions">
            <button type="button" class="toolbar__share-btn" id="share-btn" data-testid="share-btn">Share</button>
          </div>

<input
            id="load-document-input"
            type="file"
            accept="application/json,.json"
            hidden
            data-testid="load-document-input"
          />

          <!-- Floating panels (absolutely positioned below toolbar) -->
          <div
            id="shape-controls"
            class="toolbar__floating-panel toolbar__cluster toolbar__tool-panel toolbar__shape-panel"
            data-testid="shape-controls"
            hidden
          >
            <div
              id="shape-type-controls"
              class="toolbar__shape-types"
              role="group"
              aria-label="Shape type"
              data-testid="shape-type-controls"
            >
              <button
                class="toolbar__shape-type-button"
                type="button"
                title="Rectangle"
                aria-label="Rectangle"
                data-shape-type="rectangle"
                data-testid="shape-type-rectangle"
              >
                <i data-lucide="square" aria-hidden="true"></i>
              </button>
              <button
                class="toolbar__shape-type-button"
                type="button"
                title="Oval / Circle"
                aria-label="Oval / Circle"
                data-shape-type="oval"
                data-testid="shape-type-oval"
              >
                <i data-lucide="circle" aria-hidden="true"></i>
              </button>
              <button
                class="toolbar__shape-type-button"
                type="button"
                title="Rhombus"
                aria-label="Rhombus"
                data-shape-type="rhombus"
                data-testid="shape-type-rhombus"
              >
                <i data-lucide="diamond" aria-hidden="true"></i>
              </button>
              <button
                class="toolbar__shape-type-button"
                type="button"
                title="Triangle"
                aria-label="Triangle"
                data-shape-type="triangle"
                data-testid="shape-type-triangle"
              >
                <i data-lucide="triangle" aria-hidden="true"></i>
              </button>
              <button
                class="toolbar__shape-type-button"
                type="button"
                title="Divider / Line"
                aria-label="Divider / Line"
                data-shape-type="line"
                data-testid="shape-type-line"
              >
                <i data-lucide="minus" aria-hidden="true"></i>
              </button>
            </div>

            <label class="toolbar__field" title="Shape fill color">
              <span class="toolbar__sr-only">Shape fill color</span>
              <input
                id="shape-fill-color"
                type="color"
                value="#ffffff"
                aria-label="Shape fill color"
                title="Shape fill color"
                data-testid="shape-fill-color"
              />
            </label>

            <label class="toolbar__field toolbar__field--slider toolbar__shape-slider toolbar__shape-slider--opacity" title="Shape fill opacity">
              <span id="shape-opacity-label" class="toolbar__sr-only">Shape opacity</span>
              <input
                id="shape-opacity"
                type="range"
                min="0"
                max="1"
                step="0.05"
                value="0"
                data-testid="shape-opacity"
                aria-labelledby="shape-opacity-label"
                title="Shape fill opacity"
              />
              <output id="shape-opacity-value" data-testid="shape-opacity-value" title="Shape fill opacity">0</output>
            </label>

            <label class="toolbar__field" title="Shape border color">
              <span class="toolbar__sr-only">Shape border color</span>
              <input
                id="shape-stroke-color"
                type="color"
                value="#000000"
                aria-label="Shape border color"
                title="Shape border color"
                data-testid="shape-stroke-color"
              />
            </label>

            <label class="toolbar__field toolbar__field--slider toolbar__shape-slider toolbar__shape-slider--stroke-width" title="Shape border width">
              <span id="shape-stroke-width-label" class="toolbar__sr-only">Border width</span>
              <input
                id="shape-stroke-width"
                type="range"
                min="0"
                max="24"
                value="2"
                data-testid="shape-stroke-width"
                aria-labelledby="shape-stroke-width-label"
                title="Shape border width"
              />
              <output id="shape-stroke-width-value" data-testid="shape-stroke-width-value" title="Shape border width">2</output>
            </label>
          </div>
        </header>

        <div class="workspace__content">
          <section class="board-shell" data-testid="board-shell">
            <div id="canvas-container" class="canvas-container" data-testid="canvas-container"></div>

          <div
            id="calculator-widget"
            class="calc-widget"
            hidden
            role="region"
            aria-label="Binary Calculator"
            data-testid="calculator-widget"
          ></div>

          <div
            id="timer-widget"
            class="timer-widget"
            hidden
            role="region"
            aria-label="Timer / Stopwatch"
            data-testid="timer-widget"
          >
            <div class="timer-widget__header" id="timer-header">
              <div class="timer-widget__tabs" role="tablist">
                <button
                  class="timer-widget__tab is-active"
                  role="tab"
                  aria-selected="true"
                  data-mode="timer"
                  type="button"
                  data-testid="timer-tab-timer"
                >Timer</button>
                <button
                  class="timer-widget__tab"
                  role="tab"
                  aria-selected="false"
                  data-mode="stopwatch"
                  type="button"
                  data-testid="timer-tab-stopwatch"
                >Stopwatch</button>
              </div>
              <button
                id="timer-close"
                class="timer-widget__close"
                type="button"
                aria-label="Close timer"
                data-testid="timer-close"
              >✕</button>
            </div>

            <div
              class="timer-widget__display"
              id="timer-display"
              aria-live="off"
              data-testid="timer-display"
            >00:00.0</div>

            <div class="timer-widget__duration" id="timer-duration-row" hidden>
              <label class="timer-widget__duration-label">
                <span>MM</span>
                <input
                  id="timer-mm"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="99"
                  value="1"
                  data-testid="timer-mm"
                />
              </label>
              <span class="timer-widget__duration-sep">:</span>
              <label class="timer-widget__duration-label">
                <span>SS</span>
                <input
                  id="timer-ss"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                  data-testid="timer-ss"
                />
              </label>
            </div>

            <div class="timer-widget__controls">
              <button
                id="timer-start-pause"
                class="timer-widget__btn timer-widget__btn--primary"
                type="button"
                data-testid="timer-start-pause"
              >Start</button>
              <button
                id="timer-reset"
                class="timer-widget__btn"
                type="button"
                data-testid="timer-reset"
              >Reset</button>
            </div>
          </div>
          </section>

          <aside
            id="catalog-panel"
            class="catalog-sidebar"
            data-testid="catalog-panel"
            aria-label="Catalog outline"
          ></aside>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
