<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mind Map Infinite Canvas</title>
    <script id="app-snapshot" type="application/json"></script>
  </head>
  <body>
    <div class="app-shell">
<main class="workspace" data-testid="workspace">
        <div
          id="presentation-toolbar-hover-zone"
          class="presentation-toolbar-hover-zone"
          aria-hidden="true"
          data-testid="presentation-toolbar-hover-zone"
        ></div>
        <header class="toolbar" data-testid="toolbar">
          <!-- Left: project title -->
          <div class="toolbar__title-area">
            <span class="toolbar__project-title" id="project-title">Untitled</span>
          </div>

          <!-- Center: Edit / Present capsule -->
          <div class="toolbar__center">
            <button
              id="drawing-visibility-toggle"
              class="toolbar__icon-button toolbar__present-tool"
              type="button"
              aria-label="Hide drawings"
              title="Hide drawings"
              aria-pressed="true"
              data-testid="drawing-visibility-toggle"
              hidden
            >
              <i data-lucide="eye" aria-hidden="true"></i>
            </button>
            <div class="mode-capsule" id="mode-capsule" role="group" aria-label="Editing mode" data-testid="mode-capsule">
              <button type="button" class="mode-capsule__btn" data-mode="edit" id="mode-capsule-edit" data-testid="mode-capsule-edit" aria-pressed="true">Edit</button>
              <button type="button" class="mode-capsule__btn" data-mode="present" id="mode-capsule-present" data-testid="mode-capsule-present" aria-pressed="false">Present</button>
            </div>
          </div>

          <!-- Right: share / exit -->
          <div class="toolbar__actions">
            <button type="button" class="toolbar__share-btn" id="share-btn" data-testid="share-btn">Share</button>
          </div>

<input
            id="load-document-input"
            type="file"
            accept="application/json,.json"
            hidden
            data-testid="load-document-input"
          />

          <!-- Floating panels (absolutely positioned below toolbar) -->
          <div
            id="arrange-controls"
            class="toolbar__floating-panel toolbar__cluster"
            data-testid="arrange-controls"
            hidden
          >
            <button id="save-focus" class="ghost-button" type="button" data-testid="save-focus">
              Save Focus
            </button>
            <button
              id="focus-position-mode"
              class="ghost-button"
              type="button"
              aria-pressed="false"
              data-testid="focus-position-mode"
            >
              Focus: Absolute
            </button>
          </div>

          <div
            id="brush-controls"
            class="toolbar__floating-panel toolbar__cluster toolbar__tool-panel toolbar__brush-panel"
            data-testid="brush-controls"
            hidden
          >
            <div
              id="brush-type-controls"
              class="toolbar__brush-types"
              data-testid="brush-type-controls"
            >
              <button
                class="toolbar__brush-type-button"
                type="button"
                data-brush-tool-id="pen"
                data-testid="brush-type-pen"
              >
                <i data-lucide="pen" aria-hidden="true"></i>
                <span>Pen</span>
              </button>
              <button
                class="toolbar__brush-type-button"
                type="button"
                data-brush-tool-id="pencil"
                data-testid="brush-type-pencil"
              >
                <i data-lucide="pencil" aria-hidden="true"></i>
                <span>Pencil</span>
              </button>
              <button
                class="toolbar__brush-type-button"
                type="button"
                data-brush-tool-id="highlighter"
                data-testid="brush-type-highlighter"
              >
                <i data-lucide="highlighter" aria-hidden="true"></i>
                <span>Highlighter</span>
              </button>
            </div>

            <label class="toolbar__field toolbar__field--slider">
              <span id="stroke-width-label" class="toolbar__sr-only">Brush width</span>
              <input
                id="stroke-width"
                type="range"
                min="1"
                max="24"
                value="4"
                data-testid="stroke-width"
                aria-labelledby="stroke-width-label"
              />
              <output id="stroke-width-value" data-testid="stroke-width-value">4</output>
            </label>

            <label class="toolbar__field">
              <span class="toolbar__sr-only">Brush color</span>
              <input id="stroke-color" type="color" value="#1f6feb" data-testid="stroke-color" aria-label="Brush color" />
            </label>

            <div
              id="recent-colors"
              class="toolbar__recent-colors"
              data-testid="recent-colors"
            ></div>

            <button
              id="clear-strokes"
              class="ghost-button"
              type="button"
              title="Clear all strokes"
              aria-label="Clear all strokes"
              data-testid="clear-strokes"
              hidden
            >
              Clear Strokes
            </button>
          </div>

        </header>

        <div class="workspace__content">
          <section class="board-shell" data-testid="board-shell">
            <div id="canvas-container" class="canvas-container" data-testid="canvas-container"></div>

          <div
            id="calculator-widget"
            class="calc-widget"
            hidden
            role="region"
            aria-label="Binary Calculator"
            data-testid="calculator-widget"
          ></div>

          <div
            id="timer-widget"
            class="timer-widget"
            hidden
            role="region"
            aria-label="Timer / Stopwatch"
            data-testid="timer-widget"
          >
            <div class="timer-widget__header" id="timer-header">
              <div class="timer-widget__tabs" role="tablist">
                <button
                  class="timer-widget__tab is-active"
                  role="tab"
                  aria-selected="true"
                  data-mode="timer"
                  type="button"
                  data-testid="timer-tab-timer"
                >Timer</button>
                <button
                  class="timer-widget__tab"
                  role="tab"
                  aria-selected="false"
                  data-mode="stopwatch"
                  type="button"
                  data-testid="timer-tab-stopwatch"
                >Stopwatch</button>
              </div>
              <button
                id="timer-close"
                class="timer-widget__close"
                type="button"
                aria-label="Close timer"
                data-testid="timer-close"
              >✕</button>
            </div>

            <div
              class="timer-widget__display"
              id="timer-display"
              aria-live="off"
              data-testid="timer-display"
            >00:00.0</div>

            <div class="timer-widget__duration" id="timer-duration-row" hidden>
              <label class="timer-widget__duration-label">
                <span>MM</span>
                <input
                  id="timer-mm"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="99"
                  value="1"
                  data-testid="timer-mm"
                />
              </label>
              <span class="timer-widget__duration-sep">:</span>
              <label class="timer-widget__duration-label">
                <span>SS</span>
                <input
                  id="timer-ss"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                  data-testid="timer-ss"
                />
              </label>
            </div>

            <div class="timer-widget__controls">
              <button
                id="timer-start-pause"
                class="timer-widget__btn timer-widget__btn--primary"
                type="button"
                data-testid="timer-start-pause"
              >Start</button>
              <button
                id="timer-reset"
                class="timer-widget__btn"
                type="button"
                data-testid="timer-reset"
              >Reset</button>
            </div>
          </div>
          </section>

          <aside
            id="catalog-panel"
            class="catalog-sidebar"
            data-testid="catalog-panel"
            aria-label="Catalog outline"
          ></aside>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
