<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mind Map Infinite Canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__header">
          <div id="sidebar-brand" class="sidebar__brand" aria-label="Components">
            <span class="sidebar__brand-mark" aria-hidden="true">
              <i data-lucide="route"></i>
            </span>
            <h1>Components</h1>
          </div>
        </div>
        <div id="component-palette" class="component-palette"></div>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div id="tool-buttons" class="toolbar__cluster"></div>
          <div id="arrange-controls" class="toolbar__cluster toolbar__tool-panel" hidden>
            <button id="connect-selection" class="ghost-button ghost-button--icon" type="button">
              <i data-lucide="link-2" aria-hidden="true"></i>
              <span>Connect to...</span>
            </button>
            <button id="save-focus" class="ghost-button" type="button">Save Focus</button>
            <button
              id="focus-position-mode"
              class="ghost-button"
              type="button"
              aria-pressed="false"
            >
              Focus: Absolute
            </button>
          </div>
          <div id="brush-controls" class="toolbar__cluster toolbar__tool-panel" hidden>
            <label class="toolbar__field">
              <span>Color</span>
              <input id="stroke-color" type="color" value="#1f6feb" />
            </label>
            <label class="toolbar__field toolbar__field--slider">
              <span>Stroke</span>
              <input id="stroke-width" type="range" min="1" max="24" value="4" />
              <output id="stroke-width-value">4</output>
            </label>
          </div>
        </header>

        <section class="board-shell">
          <div id="canvas-container" class="canvas-container"></div>
          <label class="mode-toggle" id="mode-toggle">
            <input type="checkbox" checked />
            <span class="mode-toggle__track">
              <span class="mode-toggle__thumb"></span>
            </span>
            <span class="mode-toggle__label">Edit</span>
          </label>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
