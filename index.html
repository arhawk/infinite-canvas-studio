<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mind Map Infinite Canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" data-testid="sidebar">
        <div class="sidebar__header">
          <div id="sidebar-brand" class="sidebar__brand" aria-label="Components">
            <span class="sidebar__brand-mark" aria-hidden="true">
              <i data-lucide="route"></i>
            </span>
            <h1>Components</h1>
          </div>
        </div>
        <div id="component-palette" class="component-palette" data-testid="component-palette"></div>
      </aside>

      <main class="workspace" data-testid="workspace">
        <header class="toolbar" data-testid="toolbar">
          <div id="tool-buttons" class="toolbar__cluster" data-testid="tool-buttons"></div>
          <div id="calculator-controls" class="toolbar__cluster" data-testid="calculator-controls">
            <button
              id="calculator-toggle"
              class="tool-button"
              type="button"
              aria-label="Binary Calculator"
              title="Binary Calculator"
              aria-pressed="false"
              data-testid="calculator-toggle"
            >
              <i data-lucide="calculator" aria-hidden="true"></i>
            </button>
          </div>
          <div id="timer-controls" class="toolbar__cluster" data-testid="timer-controls">
            <button
              id="annotator-toggle"
              class="tool-button"
              type="button"
              aria-label="Annotator"
              title="Annotator tool"
              aria-pressed="false"
              data-testid="annotator-toggle"
            >
              <i data-lucide="highlighter" aria-hidden="true"></i>
            </button>
            <button
              id="timer-toggle"
              class="tool-button"
              type="button"
              aria-label="Timer / Stopwatch"
              title="Timer / Stopwatch"
              aria-pressed="false"
              data-testid="timer-toggle"
            >
              <i data-lucide="timer" aria-hidden="true"></i>
            </button>
          </div>
          <div
            id="history-controls"
            class="toolbar__cluster"
            data-testid="history-controls"
          >
            <button
              id="undo-action"
              class="ghost-button ghost-button--icon-only"
              type="button"
              aria-label="Undo"
              title="Undo"
              data-testid="undo-action"
            >
              <i data-lucide="undo-2" aria-hidden="true"></i>
            </button>
            <button
              id="redo-action"
              class="ghost-button ghost-button--icon-only"
              type="button"
              aria-label="Redo"
              title="Redo"
              data-testid="redo-action"
            >
              <i data-lucide="redo-2" aria-hidden="true"></i>
            </button>
          </div>
          <div
            id="center-map-controls"
            class="toolbar__cluster"
            data-testid="center-map-controls"
          >
            <button
              id="center-map-btn"
              class="ghost-button ghost-button--icon-only"
              type="button"
              aria-label="Center view"
              title="Center view (Home)"
              data-testid="center-map-btn"
            >
              <i data-lucide="crosshair" aria-hidden="true"></i>
            </button>
          </div>
          <div
            id="document-controls"
            class="toolbar__cluster"
            data-testid="document-controls"
          >
            <button
              id="save-document-action"
              class="ghost-button ghost-button--icon-only"
              type="button"
              aria-label="Save document as JSON"
              title="Save JSON (Mod+S)"
              data-testid="save-document-action"
            >
              <i data-lucide="download" aria-hidden="true"></i>
            </button>
            <button
              id="load-document-action"
              class="ghost-button ghost-button--icon-only"
              type="button"
              aria-label="Load document from JSON"
              title="Load JSON (Mod+O)"
              data-testid="load-document-action"
            >
              <i data-lucide="upload" aria-hidden="true"></i>
            </button>
            <input
              id="load-document-input"
              type="file"
              accept="application/json,.json"
              hidden
              data-testid="load-document-input"
            />
          </div>
          <div
            id="arrange-controls"
            class="toolbar__cluster toolbar__tool-panel"
            data-testid="arrange-controls"
            hidden
          >
            <button
              id="connect-selection"
              class="ghost-button ghost-button--icon"
              type="button"
              data-testid="connect-selection"
            >
              <i data-lucide="link-2" aria-hidden="true"></i>
              <span>Connect to...</span>
            </button>
            <button id="save-focus" class="ghost-button" type="button" data-testid="save-focus">
              Save Focus
            </button>
            <button
              id="focus-position-mode"
              class="ghost-button"
              type="button"
              aria-pressed="false"
              data-testid="focus-position-mode"
            >
              Focus: Absolute
            </button>
          </div>
          <div
            id="annotator-controls"
            class="toolbar__cluster toolbar__tool-panel"
            data-testid="annotator-controls"
            hidden
          >
            <label class="toolbar__field">
              <span>Color</span>
              <input id="annotator-color" type="color" value="#f7c948" data-testid="annotator-color" />
            </label>
            <div class="toolbar__field">
              <span>Shape</span>
              <select id="annotator-shape" class="ghost-select" data-testid="annotator-shape">
                <option value="highlight">Highlight</option>
                <option value="straight">Straight</option>
                <option value="wavy">Wavy</option>
                <option value="dashed">Dashed</option>
                <option value="circle">Circle</option>
                <option value="arrow">Arrow</option>
              </select>
            </div>
            <label class="toolbar__field toolbar__field--slider">
              <span>Width</span>
              <input id="annotator-width" type="range" min="1" max="16" value="3" data-testid="annotator-width" />
              <output id="annotator-width-value" data-testid="annotator-width-value">3</output>
            </label>
            <button id="annotator-clear" class="ghost-button" type="button" data-testid="annotator-clear">Clear</button>
          </div>
          <div
            id="brush-controls"
            class="toolbar__cluster toolbar__tool-panel"
            data-testid="brush-controls"
            hidden
          >
            <label class="toolbar__field">
              <span>Color</span>
              <input id="stroke-color" type="color" value="#1f6feb" data-testid="stroke-color" />
            </label>

            <div
              id="recent-colors"
              class="toolbar__recent-colors"
              data-testid="recent-colors"
            ></div>
            
            <label class="toolbar__field toolbar__field--slider">
              <span>Stroke</span>
              <input
                id="stroke-width"
                type="range"
                min="1"
                max="24"
                value="4"
                data-testid="stroke-width"
              />
              <output id="stroke-width-value" data-testid="stroke-width-value">4</output>
            </label>
          </div>
        </header>

        <section class="board-shell" data-testid="board-shell">
          <div id="canvas-container" class="canvas-container" data-testid="canvas-container"></div>
          <label class="mode-toggle" id="mode-toggle" data-testid="mode-toggle">
            <input type="checkbox" checked data-testid="mode-toggle-input" />
            <span class="mode-toggle__track">
              <span class="mode-toggle__thumb"></span>
            </span>
            <span class="mode-toggle__label" data-testid="mode-toggle-label">Edit</span>
          </label>

          <div
            id="calculator-widget"
            class="calc-widget"
            hidden
            role="region"
            aria-label="Binary Calculator"
            data-testid="calculator-widget"
          ></div>

          <div
            id="timer-widget"
            class="timer-widget"
            hidden
            role="region"
            aria-label="Timer / Stopwatch"
            data-testid="timer-widget"
          >
            <div class="timer-widget__tabs" role="tablist">
              <button
                class="timer-widget__tab is-active"
                role="tab"
                aria-selected="true"
                data-mode="stopwatch"
                type="button"
                data-testid="timer-tab-stopwatch"
              >Stopwatch</button>
              <button
                class="timer-widget__tab"
                role="tab"
                aria-selected="false"
                data-mode="timer"
                type="button"
                data-testid="timer-tab-timer"
              >Timer</button>
            </div>

            <div
              class="timer-widget__display"
              id="timer-display"
              aria-live="off"
              data-testid="timer-display"
            >00:00.0</div>

            <div class="timer-widget__duration" id="timer-duration-row" hidden>
              <label class="timer-widget__duration-label">
                <span>MM</span>
                <input
                  id="timer-mm"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="99"
                  value="1"
                  data-testid="timer-mm"
                />
              </label>
              <span class="timer-widget__duration-sep">:</span>
              <label class="timer-widget__duration-label">
                <span>SS</span>
                <input
                  id="timer-ss"
                  class="timer-widget__duration-input"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                  data-testid="timer-ss"
                />
              </label>
            </div>

            <div class="timer-widget__controls">
              <button
                id="timer-start-pause"
                class="timer-widget__btn timer-widget__btn--primary"
                type="button"
                data-testid="timer-start-pause"
              >Start</button>
              <button
                id="timer-reset"
                class="timer-widget__btn"
                type="button"
                data-testid="timer-reset"
              >Reset</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
